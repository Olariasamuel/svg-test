<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 Ramo de Girasoles</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#04040f;min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:'Lato',sans-serif;overflow-x:hidden;overflow-y:auto}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .page{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px}
  #scene{position:relative;width:min(440px,96vw);height:540px;flex-shrink:0}
  #mini-sun{position:absolute;left:50%;top:44%;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#fff176,#ffcc00 55%,#ff8800);box-shadow:0 0 20px 8px rgba(255,210,0,.8),0 0 60px 22px rgba(255,150,0,.4),0 0 120px 50px rgba(255,100,0,.15);transform:translate(-50%,-50%);animation:sun-pulse 2.8s ease-in-out infinite;transition:transform .5s cubic-bezier(.34,1.5,.64,1),opacity .45s ease;z-index:4}
  #mini-sun.burst{transform:translate(-50%,-50%) scale(4.5)!important;opacity:0!important}
  @keyframes sun-pulse{0%,100%{box-shadow:0 0 20px 8px rgba(255,210,0,.8),0 0 60px 22px rgba(255,150,0,.4),0 0 120px 50px rgba(255,100,0,.15)}50%{box-shadow:0 0 32px 14px rgba(255,230,0,.95),0 0 85px 35px rgba(255,160,0,.55),0 0 160px 70px rgba(255,110,0,.22)}}
  #bouquet-svg{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transition:opacity .4s ease;overflow:visible}
  #bouquet-svg.visible{opacity:1}
  /* KEY: petal-group only animates scale. Petals have absolute cx/cy coords. */
  .petal-group{transform-box:fill-box;transform-origin:50% 50%;transform:scale(0);opacity:0;transition:transform .55s cubic-bezier(.34,1.58,.64,1),opacity .3s ease}
  .leaf-group{transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0);opacity:0;transition:transform .38s cubic-bezier(.34,1.4,.64,1),opacity .28s ease}
  .paper-piece{opacity:0;transition:opacity .5s ease}
  .stem-line{opacity:0;transition:opacity .35s ease}
  .sway-pos{transform-box:fill-box;transform-origin:50% 100%}
  @keyframes sway1{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
  @keyframes sway2{0%,100%{transform:rotate(2deg)}50%{transform:rotate(-2deg)}}
  @keyframes sway3{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(2deg)}}
  @keyframes sway4{0%,100%{transform:rotate(1.5deg)}50%{transform:rotate(-2.5deg)}}
  @keyframes sway5{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(3deg)}}
  @keyframes sway6{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-1.5deg)}}
  @keyframes sway7{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(2.5deg)}}
  @keyframes sway8{0%,100%{transform:rotate(2.5deg)}50%{transform:rotate(-2deg)}}
  @keyframes sway9{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(1.5deg)}}
  @keyframes sway10{0%,100%{transform:rotate(1deg)}50%{transform:rotate(-3deg)}}
  @keyframes sway11{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  @keyframes sway12{0%,100%{transform:rotate(2deg)}50%{transform:rotate(-3deg)}}
  @keyframes sway13{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(2.5deg)}}
  @keyframes sway14{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-2deg)}}
  @keyframes sway15{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(1.5deg)}}
  #open-btn{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a0800;font-family:'Playfair Display',serif;font-size:clamp(.9rem,2.4vw,1.1rem);font-weight:700;border:none;padding:15px 34px;border-radius:50px;cursor:pointer;margin-top:18px;letter-spacing:.02em;flex-shrink:0;animation:pulse-btn 2.4s ease-in-out infinite;transition:transform .2s,opacity .4s,max-height .4s,margin .4s,padding .4s;overflow:hidden;max-height:80px}
  #open-btn:hover{transform:scale(1.06)}
  #open-btn.hidden{opacity:0;pointer-events:none;max-height:0;margin-top:0;padding-top:0;padding-bottom:0}
  @keyframes pulse-btn{0%,100%{box-shadow:0 4px 24px rgba(255,180,0,.5),0 0 0 0 rgba(255,200,0,.35)}50%{box-shadow:0 4px 32px rgba(255,180,0,.65),0 0 0 14px rgba(255,200,0,0)}}
  #message-card{width:min(440px,90vw);background:rgba(8,6,22,.78);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid rgba(255,200,60,.3);border-radius:20px;padding:22px 28px;text-align:center;opacity:0;transform:translateY(20px);transition:opacity .9s ease,transform .9s ease;margin-top:24px;pointer-events:none;flex-shrink:0}
  #message-card.visible{opacity:1;transform:translateY(0);pointer-events:auto}
  #message-card h2{font-family:'Playfair Display',serif;font-size:clamp(1.05rem,3.2vw,1.35rem);color:#FFD700;margin-bottom:9px}
  #message-card p{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.78rem,2vw,.92rem);color:rgba(255,218,120,.72);line-height:1.55}
</style>

<script>
(function(){
  const cv=document.getElementById('stars'),ctx=cv.getContext('2d');
  let W,H,S=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  function init(){S=[];const n=Math.floor(W*H/2600);for(let i=0;i<n;i++)S.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.3,ph:Math.random()*Math.PI*2,ts:Math.random()*0.007+0.003,vx:(Math.random()-.5)*0.14,vy:(Math.random()-.5)*0.09});}
  let t=0;
  function draw(){ctx.clearRect(0,0,W,H);t+=0.016;for(const s of S){s.x+=s.vx;s.y+=s.vy;if(s.x<-2)s.x=W+2;if(s.x>W+2)s.x=-2;if(s.y<-2)s.y=H+2;if(s.y>H+2)s.y=-2;const a=0.15+0.85*(0.5+0.5*Math.sin(t*s.ts*60+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,240,${a.toFixed(2)})`;ctx.fill();}requestAnimationFrame(draw);}
  window.addEventListener('resize',()=>{resize();init();});resize();init();draw();
})();
const btn=document.getElementById('open-btn'),
      sun=document.getElementById('mini-sun'),
      svg=document.getElementById('bouquet-svg'),
      card=document.getElementById('message-card');
const swayNames=['sway1','sway2','sway3','sway4','sway5','sway6','sway7','sway8','sway9','sway10','sway11','sway12','sway13','sway14','sway15'];
const swayDurs=[3800,4200,3500,4600,4000,3700,4400,3900,4100,3600,4300,3800,4500,3700,4000];
btn.addEventListener('click',()=>{
  btn.classList.add('hidden');
  sun.classList.add('burst');
  setTimeout(()=>{
    sun.style.display='none';
    svg.classList.add('visible');
    document.querySelectorAll('.stem-line').forEach((s,i)=>setTimeout(()=>{s.style.opacity='1';},i*20));
    setTimeout(()=>document.querySelectorAll('.paper-piece').forEach((p,i)=>setTimeout(()=>{p.style.opacity='1';},i*50)),160);
    const BASE=300,STEP=195,LEAF=320;
    const pgs=document.querySelectorAll('.petal-group');
    const lgs=document.querySelectorAll('.leaf-group');
    const sws=document.querySelectorAll('.sway-pos');
    pgs.forEach((pg,i)=>setTimeout(()=>{pg.style.transform='scale(1)';pg.style.opacity='1';},BASE+i*STEP));
    lgs.forEach((lg,i)=>setTimeout(()=>{lg.style.transform='scaleY(1)';lg.style.opacity='1';},BASE+i*STEP+LEAF));
    sws.forEach((sg,i)=>setTimeout(()=>{sg.style.animation=`${swayNames[i]} ${swayDurs[i]}ms ease-in-out infinite`;},BASE+i*STEP+500));
    const total=BASE+(pgs.length-1)*STEP+800;
    setTimeout(()=>card.classList.add('visible'),total);
  },480);
});
</script>
</body>
</html>
